<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chop Pig Web</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function authenticate() {
            const password = document.getElementById('password-input').value;
            if (password === 'yourPassword') { // Replace with a secure password check
                sessionStorage.setItem('authenticated', 'true');
                enableControls();
                closeModal();
            } else {
                alert('Incorrect password');
            }
        }
        function checkAuthentication() {
            if (sessionStorage.getItem('authenticated') !== 'true') {
                disableControls();
                openModal();
            } else {
                enableControls();
            }
        }
        function openModal() {
            document.getElementById('login-modal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('login-modal').style.display = 'none';
        }
        function logout() {
            sessionStorage.removeItem('authenticated');
            disableControls();
            openModal();
        }
        function enableControls() {
            const controls = document.querySelectorAll('.control');
            controls.forEach(control => control.disabled = false);
        }
        function disableControls() {
            const controls = document.querySelectorAll('.control');
            controls.forEach(control => control.disabled = true);
        }
        window.onload = checkAuthentication;
    </script>
</head>
<body>
    <div id="login-modal" style="display: none;">
        <div>
            <h2>Login</h2>
            <input type="password" id="password-input" placeholder="Enter password">
            <button onclick="authenticate()">Login</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <h1>Welcome to Chop Pig Web</h1>
    <div class="controls">
        <button class="control" onclick="addPlayer()">Add Player</button>
        <button class="control" onclick="addRoundScores()">Add Round Scores</button>
        <button class="control" onclick="importData()">Import</button>
        <button class="control" onclick="openStinky2()">Stinky 2</button>
        <button class="control" onclick="editChop()">Chop Edits</button>
        <button onclick="logout()">Logout</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
