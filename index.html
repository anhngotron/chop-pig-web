<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chop Pig Score Tracker</title>

    <!-- Base + App Styles -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/app.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="app-header">
        <h1>Chop Pig</h1>
        <button id="darkModeToggle" class="icon-btn">🌙</button>
    </header>

    <!-- PLAYER LIST + CONTROLS -->
    <section class="controls-section">
        <div class="controls-row">
            <button id="addPlayerBtn" class="primary-btn">Add Player</button>
            <button id="newRoundBtn" class="secondary-btn">New Round</button>
        </div>

        <div class="controls-row">
            <button id="exportBtn" class="secondary-btn">Export JSON</button>
            <button id="importBtn" class="secondary-btn">Import JSON</button>
        </div>
    </section>

    <!-- PLAYER CARDS -->
    <section id="playerList" class="player-list"></section>

    <!-- ROUND ENTRY -->
    <section id="roundSection" class="round-section">
        <h2>Round Results</h2>
        <div id="roundRows" class="round-rows"></div>
        <button id="saveRoundBtn" class="primary-btn full-width">Save Round</button>
    </section>

    <!-- LEADERBOARD -->
    <section class="leaderboard-section">
        <h2>Leaderboard</h2>
        <div id="leaderboard" class="leaderboard"></div>
    </section>

    <!-- MODALS -->
    <div id="modalOverlay" class="modal-overlay hidden"></div>

    <!-- Add Player Modal -->
    <div id="addPlayerModal" class="modal hidden">
        <h3>Add Player</h3>
        <input id="newPlayerName" type="text" placeholder="Player name" />
        <button id="confirmAddPlayer" class="primary-btn full-width">Add</button>
        <button class="close-modal secondary-btn full-width">Cancel</button>
    </div>

    <!-- Import JSON Modal -->
    <div id="importModal" class="modal hidden">
        <h3>Import JSON</h3>
        <textarea id="importText" placeholder="Paste JSON here"></textarea>
        <button id="confirmImport" class="primary-btn full-width">Import</button>
        <button class="close-modal secondary-btn full-width">Cancel</button>
    </div>

    <!-- Scripts -->
    <script src="js/state.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
