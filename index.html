<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chop Pig Score Tracker (Cloud Sync)</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { text-align: center; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .top-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .section { margin-bottom: 20px; }
    .row-table { border-collapse: collapse; width: 100%; max-width: 900px; margin: 0 auto; }
    .row-table th, .row-table td { border: 1px solid #ccc; padding: 4px 6px; text-align: center; }
    .row-table th { background: #f0f0f0; }
    .controls { display: flex; justify-content: center; gap: 10px; margin: 15px 0; align-items: center; flex-wrap: wrap; }
    .leaderboard { margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
    .leaderboard table { width: 100%; border-collapse: collapse; }
    .leaderboard th, .leaderboard td { border: 1px solid #ccc; padding: 4px 6px; text-align: center; }
    .rank1 { background: #FFD700; font-weight: bold; }
    .rank2 { background: #C0C0C0; }
    .rank3 { background: #CD7F32; }
    .last { background: #FFCCCC; }
    .unranked { background: #FFFFFF; }
    .normal { background: #FFFFFF; }
    .btn { padding: 4px 10px; cursor: pointer; }
    .btn-small { padding: 2px 6px; font-size: 12px; cursor: pointer; }
    .input-small { width: 80px; }
    .add-player-section { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .add-player-section input { padding: 4px; }
    #syncStatus { font-size: 12px; color: #555; }
    #modeBanner { font-size: 12px; color: #a00; text-align: center; margin-bottom: 8px; }
    .chopped-by { font-size: 12px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: #fff; padding: 15px; max-width: 520px; max-height: 80vh; overflow-y: auto; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.4); }
    .modal h2 { margin-top: 0; }
    .label-row { display: flex; align-items: center; margin-bottom: 4px; }
    .label-row span.label { width: 220px; text-align: left; }
    .spin { width: 40px; }
    .tooltip { position: relative; cursor: help; }
    .tooltip:hover::after {
      content: attr(data-tip);
      position: absolute;
      left: 0;
      top: 100%;
      white-space: pre-line;
      background: #ffffe0;
      border: 1px solid #ccc;
      padding: 4px 6px;
      font-size: 11px;
      z-index: 2000;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
  <div class="top-bar">
    <h1>Chop Pig Score Tracker (Cloud Sync)</h1>
    <div class="top-right">
      <button class="btn" id="loginBtn" onclick="handleLoginClick()">Login</button>
      <button class="btn" onclick="refreshFromCloud()">Refresh</button>
    </div>
  </div>

  <div id="modeBanner"></div>

  <div class="section add-player-section">
    <label>New Player Name:
      <input type="text" id="newPlayerName" />
    </label>
    <button class="btn" id="addPlayerBtn" onclick="addPlayer()">Add Player</button>
  </div>

  <div class="section">
    <table class="row-table">
      <thead>
        <tr>
          <th>Player Name</th>
          <th>Placement</th>
          <th>Score</th>
          <th>Stinky 2</th>
          <th>Got Chopped?</th>
          <th>Chopped By</th>
          <th>Clear</th>
        </tr>
      </thead>
      <tbody id="roundRows"></tbody>
    </table>

    <div style="text-align:center; margin-top:10px;">
      <button class="btn" id="addRoundBtn" onclick="addRoundScores()">Add Round Scores</button>
    </div>
  </div>

  <div class="section controls">
    <button class="btn" id="exportBtn" onclick="exportToExcel()">Export to Excel</button>
    <input type="file" id="importFile" accept=".xlsx" style="display:none" onchange="importFromExcel(event)" />
    <button class="btn" id="importBtn" onclick="document.getElementById('importFile').click()">Import from Excel</button>
    <button class="btn" onclick="openReadme()">Read Me</button>
    <button class="btn" id="syncNowBtn" onclick="manualSync()">Sync Now</button>
    <span id="syncStatus"></span>
  </div>

  <div class="section leaderboard">
    <table>
      <thead>
        <tr>
          <th>Rank</</th>
          <th>Player Name</th>
          <th>Total Score</th>
          <th>Games Played</th>
          <th>Win Rate (%)</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
/* ---------------------------------------------------------
   AUTH / MODE
--------------------------------------------------------- */
let canSave = false;
let appPassword = "";
let players = {};
let playerList = [];

function updateModeBanner() {
  const banner = document.getElementById("modeBanner");
  const loginBtn = document.getElementById("loginBtn");
  const disabled = !canSave;

  document.getElementById("addPlayerBtn").disabled = disabled;
  document.getElementById("addRoundBtn").disabled = disabled;
  document.getElementById("exportBtn").disabled = disabled;
  document.getElementById("importBtn").disabled = disabled;
  document.getElementById("syncNowBtn").disabled = disabled;

  for (const r of rowState) {
    r.playerSelect.disabled = disabled;
    r.placeSelect.disabled = disabled;
    r.stinky2Checkbox.disabled = disabled;
    r.chopCheckbox.disabled = disabled;
  }

  if (canSave) {
    banner.textContent = "";
    loginBtn.textContent = "Logout";
  } else {
    banner.textContent = "🔒 View-only mode — login to make changes";
    loginBtn.textContent = "Login";
  }
}

async function handleLoginClick() {
  if (canSave) {
    canSave = false;
    appPassword = "";
    setSyncStatus("Logged out — view-only mode", "gray");
    updateModeBanner();
    return;
  }

  const pwd = prompt("Enter password to enable saving:");
  if (!pwd) {
    setSyncStatus("View-only mode", "gray");
    return;
  }

  try {
    const resp = await fetch("/api/check-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pwd })
    });

    if (!resp.ok) {
      alert("Incorrect password. View-only mode enabled.");
      setSyncStatus("View-only mode", "gray");
      canSave = false;
      appPassword = "";
      updateModeBanner();
      return;
    }

    canSave = true;
    appPassword = pwd;
    setSyncStatus("Logged in — saving enabled", "green");
    updateModeBanner();
  } catch (err) {
    console.error("Login error:", err);
    alert("Error checking password. Staying in view-only mode.");
    setSyncStatus("View-only mode", "gray");
  }
}

/* ---------------------------------------------------------
   CLOUD LOAD FROM GITHUB
--------------------------------------------------------- */
async function loadStateFromGitHub() {
  try {
    const owner = "anhngotron";
    const repo = "chop-pig-web";
    const url = `https://raw.githubusercontent.com/${owner}/${repo}/main/chop_pig_state_latest.json`;

    const resp = await fetch(url, { cache: "no-store" });

    if (!resp.ok) {
      console.warn("No GitHub state found yet.");
      return;
    }

    const data = await resp.json();
    players = data.players || {};
    playerList = data.playerList || [];
    playerList.sort();

    console.log("Loaded state from GitHub:", data);
  } catch (err) {
    console.error("Failed to load from GitHub:", err);
  }
}

async function refreshFromCloud() {
  setSyncStatus("Refreshing…", "#888");
  await loadStateFromGitHub();
  updatePlayerDropdowns();
  refreshTable();
  setSyncStatus("Refreshed ✓", "green");
}

/* ---------------------------------------------------------
   AUTOSAVE TO GITHUB
--------------------------------------------------------- */
function setSyncStatus(text, color = "#555") {
  const el = document.getElementById("syncStatus");
  if (!el) return;
  el.textContent = text;
  el.style.color = color;
}

function saveState() {
  if (!canSave) {
    setSyncStatus("View-only mode — not synced", "gray");
    return;
  }

  const data = { players, playerList };

  setSyncStatus("Syncing…", "#888");

  fetch("/api/save-state", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-App-Password": appPassword
    },
    body: JSON.stringify(data)
  })
  .then(res => {
    if (!res.ok) throw new Error("GitHub sync failed");
    setSyncStatus("Saved ✓", "green");
  })
  .catch(err => {
    console.warn("GitHub autosave failed:", err);
    setSyncStatus("Sync failed ⚠", "red");
  });
}

function manualSync() {
  saveState();
}

/* ---------------------------------------------------------
   STATE / CONSTANTS
--------------------------------------------------------- */
const baseScores = {
  "1st": 4,
  "2nd": 2,
  "3rd": -2,
  "4th": -4,
  "Stinky 13": -5
};
const basePlacements = ["1st", "2nd", "3rd", "4th", "Stinky 13"];

let stinky2Enabled = [false, false, false, false];
let Stinky2_red = [0, 0, 0, 0];
let Stinky2_black = [0, 0, 0, 0];
let Stinky2_pairs3 = [0, 0, 0, 0];
let Stinky2_kind4 = [0, 0, 0, 0];
let Stinky2_pairs4 = [0, 0, 0, 0];

let chopData = [[], [], [], []];

const rowCount = 4;
const rowState = [];

/* ---------------------------------------------------------
   INIT
--------------------------------------------------------- */
function init() {
  const tbody = document.getElementById("roundRows");

  for (let i = 0; i < rowCount; i++) {
    const tr = document.createElement("tr");

    const tdPlayer = document.createElement("td");
    const selPlayer = document.createElement("select");
    selPlayer.innerHTML = `<option value="">--</option>`;
    selPlayer.onchange = () => { onPlayerSelected(i); saveState(); };
    tdPlayer.appendChild(selPlayer);
    tr.appendChild(tdPlayer);

    const tdPlace = document.createElement("td");
    const selPlace = document.createElement("select");
    selPlace.innerHTML =
      `<option value="">--</option>` +
      basePlacements.map(p => `<option value="${p}">${p}</option>`).join("");
    selPlace.onchange = () => { onPlacementChanged(); saveState(); };
    tdPlace.appendChild(selPlace);
    tr.appendChild(tdPlace);

    const tdScore = document.createElement("td");
    const inpScore = document.createElement("input");
    inpScore.type = "text";
    inpScore.readOnly = true;
    inpScore.className = "input-small";
    tdScore.appendChild(inpScore);
    tr.appendChild(tdScore);

    const tdStinky = document.createElement("td");
    const chkStinky = document.createElement("input");
    chkStinky.type = "checkbox";
    chkStinky.onchange = () => { handleStinky2Checkbox(i); saveState(); };
    tdStinky.appendChild(chkStinky);
    tr.appendChild(tdStinky);

    const tdChop = document.createElement("td");
    const chkChop = document.createElement("input");
    chkChop.type = "checkbox";
    chkChop.onchange = () => { handleChopCheckbox(i); saveState(); };
    tdChop.appendChild(chkChop);

    const btnEdit = document.createElement("button");
    btnEdit.textContent = "Edit";
    btnEdit.className = "btn-small";
    btnEdit.style.marginLeft = "6px";
    btnEdit.onclick = () => editChop(i);
    tdChop.appendChild(btnEdit);
    tr.appendChild(tdChop);

    const tdChoppedBy = document.createElement("td");
    const spanChoppedBy = document.createElement("span");
    spanChoppedBy.className = "chopped-by";
    tdChoppedBy.appendChild(spanChoppedBy);
    tr.appendChild(tdChoppedBy);

    const tdClear = document.createElement("td");
    const btnClear = document.createElement("button");
    btnClear.textContent = "Clear";
    btnClear.className = "btn-small";
    btnClear.onclick = () => { clearRow(i); saveState(); };
    tdClear.appendChild(btnClear);
    tr.appendChild(tdClear);

    tbody.appendChild(tr);

    rowState.push({
      playerSelect: selPlayer,
      placeSelect: selPlace,
      scoreInput: inpScore,
      stinky2Checkbox: chkStinky,
      chopCheckbox: chkChop,
      choppedBySpan: spanChoppedBy
    });
  }

  updatePlayerDropdowns();
  refreshTable();
  updateModeBanner();
}

/* ---------------------------------------------------------
   PLAYER MANAGEMENT
--------------------------------------------------------- */
function addPlayer() {
  const input = document.getElementById("newPlayerName");
  const name = input.value.trim();
  if (!name) {
    alert("Please enter a player name.");
    return;
  }
  if (players[name]) {
    alert("This player already exists.");
    return;
  }
  players[name] = { score: 0, games: 0, wins: 0 };
  playerList.push(name);
  playerList.sort();
  updatePlayerDropdowns();
  refreshTable();
  saveState();
  input.value = "";
}

function onPlayerSelected(idx) {
  updatePlayerDropdowns();
  autoFillAllScores();
}

function updatePlayerDropdowns() {
  const selected = rowState.map(r => r.playerSelect.value);
  for (let i = 0; i < rowCount; i++) {
    const sel = rowState[i].playerSelect;
    const current = sel.value;
    const allowed = playerList.filter(
      p => !selected.includes(p) || p === current
    );
    const oldVal = sel.value;
    sel.innerHTML =
      `<option value="">--</option>` +
      allowed.map(p => `<option value="${p}">${p}</option>`).join("");
    if (oldVal && allowed.includes(oldVal)) {
      sel.value = oldVal;
    } else if (!allowed.includes(oldVal)) {
      sel.value = "";
    }
  }
}

function findPlayerRow(name) {
  for (let i = 0; i < rowCount; i++) {
    if (rowState[i].playerSelect.value === name) return i;
  }
  return null;
}

/* ---------------------------------------------------------
   PLACEMENT & CLEARING
--------------------------------------------------------- */
function onPlacementChanged() {
  updatePlacementOptions();
  autoFillAllScores();
}

function updatePlacementOptions() {
  const placementsNow = rowState.map(r => r.placeSelect.value);
  const stinky13Count = placementsNow.filter(p => p === "Stinky 13").length;

  let allowedGlobal = basePlacements.slice();

  if (stinky13Count === 1) {
    allowedGlobal = allowedGlobal.filter(p => p !== "4th");
  } else if (stinky13Count === 2) {
    allowedGlobal = allowedGlobal.filter(p => !["3rd", "4th"].includes(p));
  } else if (stinky13Count >= 3) {
    allowedGlobal = allowedGlobal.filter(
      p => !["2nd", "3rd", "4th"].includes(p)
    );
  }

  for (let i = 0; i < rowCount; i++) {
    const current = placementsNow[i];
    const usedByOthers = [];
    for (let j = 0; j < rowCount; j++) {
      if (
        j !== i &&
        ["1st", "2nd", "3rd", "4th"].includes(placementsNow[j])
      ) {
        usedByOthers.push(placementsNow[j]);
      }
    }

    const allowedForRow = [];
    for (const p of allowedGlobal) {
      if (p === "Stinky 13") {
        allowedForRow.push(p);
      } else if (!usedByOthers.includes(p)) {
        allowedForRow.push(p);
      }
    }

    const sel = rowState[i].placeSelect;
    const oldVal = sel.value;
    sel.innerHTML =
      `<option value="">--</option>` +
      allowedForRow.map(p => `<option value="${p}">${p}</option>`).join("");
    if (oldVal && allowedForRow.includes(oldVal)) {
      sel.value = oldVal;
    } else if (oldVal && !allowedForRow.includes(oldVal)) {
      sel.value = "";
      rowState[i].scoreInput.value = "";
      stinky2Enabled[i] = false;
      Stinky2_red[i] = 0;
      Stinky2_black[i] = 0;
      Stinky2_pairs3[i] = 0;
      Stinky2_kind4[i] = 0;
      Stinky2_pairs4[i] = 0;
      rowState[i].stinky2Checkbox.checked = false;

      chopData[i] = [];
      rowState[i].chopCheckbox.checked = false;
      rowState[i].choppedBySpan.textContent = "";
    }
  }
}

function clearRow(idx) {
  const r = rowState[idx];
  r.playerSelect.value = "";
  r.placeSelect.value = "";
  r.scoreInput.value = "";

  stinky2Enabled[idx] = false;
  Stinky2_red[idx] = 0;
  Stinky2_black[idx] = 0;
  Stinky2_pairs3[idx] = 0;
  Stinky2_kind4[idx] = 0;
  Stinky2_pairs4[idx] = 0;
  r.stinky2Checkbox.checked = false;

  chopData[idx] = [];
  r.chopCheckbox.checked = false;
  r.choppedBySpan.textContent = "";

  updatePlayerDropdowns();
  updatePlacementOptions();
  autoFillAllScores();
}

/* ---------------------------------------------------------
   STINKY 2
--------------------------------------------------------- */
function isStinky2AllowedForRow(idx) {
  const placementsNow = rowState.map(r => r.placeSelect.value);
  const stinky13Count = placementsNow.filter(p => p === "Stinky 13").length;
  const place = placementsNow[idx];

  if (!place) return false;

  if (place === "4th" && stinky13Count === 0) return true;
  if (place === "Stinky 13") return true;
  if (place === "3rd" && stinky13Count === 1) return true;

  return false;
}

function validStinky2Combo(red, black) {
  const combos = [
    [1, 0],
    [0, 1],
    [1, 1],
    [2, 0],
    [0, 2],
    [2, 1],
    [1, 2]
  ];
  return combos.some(([r, b]) => r === red && b === black);
}

function stinky2Total(red, black, p3, k4, p4) {
  return -2 * red - 1 * black - 2 * p3 - 4 * k4 - 5 * p4;
}

function handleStinky2Checkbox(idx) {
  const chk = rowState[idx].stinky2Checkbox;
  if (!chk.checked) {
    stinky2Enabled[idx] = false;
    Stinky2_red[idx] = 0;
    Stinky2_black[idx] = 0;
    Stinky2_pairs3[idx] = 0;
    Stinky2_kind4[idx] = 0;
    Stinky2_pairs4[idx] = 0;
    autoFillAllScores();
    return;
  }
  openStinky2Popup(idx);
}

function openStinky2Popup(idx) {
  if (!isStinky2AllowedForRow(idx)) {
    alert(
      "Stinky 2 is allowed only for:\n" +
      "- 4th place (when no Stinky 13)\n" +
      "- Stinky 13 (any time there is Stinky 13)\n" +
      "- 3rd place (only when there is exactly one Stinky 13)"
    );
    rowState[idx].stinky2Checkbox.checked = false;
    return;
  }

  const modal = document.getElementById("modalContent");
  modal.innerHTML = `<h2>Stinky 2 for Player Row ${idx + 1}</h2>`;

  function addRow(icon, labelText, tip, currentVal, maxVal) {
    const div = document.createElement("div");
    div.className = "label-row";

    const label = document.createElement("span");
    label.className = "label tooltip";
    label.dataset.tip = tip;
    label.textContent = `${icon}  ${labelText}:`;
    div.appendChild(label);

    const minus = document.createElement("button");
    minus.textContent = "-";
    minus.className = "btn-small";
    minus.onclick = () => {
      currentVal.input.value = Math.max(
        0,
        parseInt(currentVal.input.value || "0") - 1
      );
    };
    div.appendChild(minus);

    const input = document.createElement("input");
    input.type = "number";
    input.className = "spin";
    input.value = currentVal.value;
    input.min = 0;
    input.max = maxVal;
    currentVal.input = input;
    div.appendChild(input);

    const plus = document.createElement("button");
    plus.textContent = "+";
    plus.className = "btn-small";
    plus.onclick = () => {
      const v = Math.min(
        maxVal,
        parseInt(currentVal.input.value || "0") + 1
      );
      currentVal.input.value = v;
    };
    div.appendChild(plus);

    modal.appendChild(div);
  }

  const red = { value: Stinky2_red[idx] };
  const black = { value: Stinky2_black[idx] };
  const p3 = { value: Stinky2_pairs3[idx] };
  const k4 = { value: Stinky2_kind4[idx] };
  const p4 = { value: Stinky2_pairs4[idx] };

  addRow("🔥🐷", "Red Pigs", "Red Pig = -2 points each", red, 3);
  addRow("🐷", "Black Pigs", "Black Pig = -1 point each", black, 3);
  addRow("🔥🐷", "3 Consecutive Pairs", "3 Consecutive Pairs = -2 points", p3, 3);
  addRow("🔥🔥🐷🐷", "4 of a Kind", "4 of a Kind = -4 points", k4, 3);
  addRow("🔥🔥🐷🐷🐷", "4 Consecutive Pairs", "4 Consecutive Pairs = -5 points", p4, 3);

  const btnSave = document.createElement("button");
  btnSave.textContent = "Save";
  btnSave.className = "btn";
  btnSave.style.marginTop = "10px";
  btnSave.onclick = () => {
    const r = parseInt(red.input.value || "0");
    const b = parseInt(black.input.value || "0");
    const pp3 = parseInt(p3.input.value || "0");
    const kk4 = parseInt(k4.input.value || "0");
    const pp4 = parseInt(p4.input.value || "0");

    if (!validStinky2Combo(r, b)) {
      alert(
        "Allowed Stinky 2 red/black combos:\n" +
        "1 Red\n1 Black\n1 Red + 1 Black\n" +
        "2 Red\n2 Black\n2 Red + 1 Black\n1 Red + 2 Black"
      );
      return;
    }

    stinky2Enabled[idx] = true;
    Stinky2_red[idx] = r;
    Stinky2_black[idx] = b;
    Stinky2_pairs3[idx] = pp3;
    Stinky2_kind4[idx] = kk4;
    Stinky2_pairs4[idx] = pp4;

    autoFillAllScores();
    closeModal();
  };
  modal.appendChild(btnSave);

  openModal();
}

/* ---------------------------------------------------------
   CHOP PIGS
--------------------------------------------------------- */
function chopPoints(type) {
  if (type === "Black Pigs") return 1;
  if (type === "Red Pigs") return 2;
  if (type === "3 Consecutive Pairs") return 2;
  if (type === "4 of a Kind") return 4;
  if (type === "4 Consecutive Pairs") return 5;
  return 0;
}

function handleChopCheckbox(idx) {
  const chk = rowState[idx].chopCheckbox;
  if (!chk.checked) {
    chopData[idx] = [];
    autoFillAllScores();
    return;
  }
  const player = rowState[idx].playerSelect.value;
  if (!player) {
    alert("Select a player before using Chop Pigs.");
    chk.checked = false;
    return;
  }
  openChopPopup(idx);
}

function editChop(idx) {
  if (!rowState[idx].chopCheckbox.checked) {
    alert("This player has no chop data to edit.");
    return;
  }
  openChopPopup(idx);
}

function openChopPopup(idx) {
  const modal = document.getElementById("modalContent");
  modal.innerHTML = `<h2>Chop Pigs for Player Row ${idx + 1}</h2>`;

  const container = document.createElement("div");
  modal.appendChild(container);

  const types = [
    ["Black Pigs", 2],
    ["Red Pigs", 2],
    ["3 Consecutive Pairs", 3],
    ["4 of a Kind", 3],
    ["4 Consecutive Pairs", 3]
  ];

  const iconMap = {
    "Black Pigs": "🐷",
    "Red Pigs": "🔥🐷",
    "3 Consecutive Pairs": "🔥🐷",
    "4 of a Kind": "🔥🔥🐷🐷",
    "4 Consecutive Pairs": "🔥🔥🐷🐷🐷"
  };

  const tooltipMap = {
    "Black Pigs": "Black Pig = 1 point",
    "Red Pigs": "Red Pig = 2 points",
    "3 Consecutive Pairs": "3 Consecutive Pairs = 2 points",
    "4 of a Kind": "4 of a Kind = 4 points",
    "4 Consecutive Pairs": "4 Consecutive Pairs = 5 points"
  };

  const chopperRows = [];

  function removeChopperBlock(block) {
    container.removeChild(block);
    const idxRow = chopperRows.findIndex(r => r.frame === block);
    if (idxRow >= 0) chopperRows.splice(idxRow, 1);
  }

  function addChopperRow(existing) {
    const block = document.createElement("fieldset");
    block.style.marginBottom = "8px";

    const legend = document.createElement("legend");
    legend.textContent = "Chopper Entry";
    block.appendChild(legend);

    const btnRemove = document.createElement("button");
    btnRemove.textContent = "Remove";
    btnRemove.className = "btn-small";
    btnRemove.style.float = "right";
    btnRemove.onclick = () => removeChopperBlock(block);
    block.appendChild(btnRemove);

    const labelChopper = document.createElement("div");
    labelChopper.textContent = "Chopper:";
    block.appendChild(labelChopper);

    const selChopper = document.createElement("select");
    selChopper.innerHTML =
      `<option value="">--</option>` +
      playerList.map(p => `<option value="${p}">${p}</option>`).join("");
    if (existing) selChopper.value = existing.chopper;
    block.appendChild(selChopper);

    const typeVars = {};

    for (const [label, maxVal] of types) {
      const frame = document.createElement("div");
      frame.className = "label-row";

      const lbl = document.createElement("span");
      lbl.className = "label tooltip";
      lbl.dataset.tip = tooltipMap[label];
      lbl.textContent = `${iconMap[label]}  ${label}`;
      frame.appendChild(lbl);

      const spin = document.createElement("input");
      spin.type = "number";
      spin.min = 0;
      spin.max = maxVal;
      spin.className = "spin";
      spin.value = existing ? existing.types[label] || 0 : 0;
      frame.appendChild(spin);

      typeVars[label] = spin;
      block.appendChild(frame);
    }

    container.appendChild(block);
    chopperRows.push({
      frame: block,
      chopperSelect: selChopper,
      typeVars
    });
  }

  for (const entry of chopData[idx]) {
    addChopperRow(entry);
  }
  if (chopperRows.length === 0) addChopperRow(null);

  const btnAdd = document.createElement("button");
  btnAdd.textContent = "Add another chopper";
  btnAdd.className = "btn";
  btnAdd.style.marginTop = "10px";
  btnAdd.onclick = () => addChopperRow(null);
  modal.appendChild(btnAdd);

  const btnSave = document.createElement("button");
  btnSave.textContent = "Save";
  btnSave.className = "btn";
  btnSave.style.marginTop = "10px";
  btnSave.style.marginLeft = "10px";
  btnSave.onclick = () => {
    const newList = [];
    const victim = rowState[idx].playerSelect.value;

    for (const row of chopperRows) {
      const name = row.chopperSelect.value;
      if (!name) {
        alert("Every chopper must have a name.");
        return;
      }
      if (name === victim) {
        alert("A player cannot chop themselves.");
        return;
      }
      if (newList.some(e => e.chopper === name)) {
        alert(`${name} is already listed as a chopper.`);
        return;
      }

      const typesDict = {};
      let allZero = true;

      for (const [label, maxVal] of types) {
        let v = parseInt(row.typeVars[label].value || "0");
        if (isNaN(v)) v = 0;
        v = Math.max(0, Math.min(maxVal, v));
        row.typeVars[label].value = v;
        typesDict[label] = v;
        if (v > 0) allZero = false;
      }

      if (allZero) {
        alert("Each chopper must have at least one chop type.");
        return;
      }

      newList.push({ chopper: name, types: typesDict });
    }

    chopData[idx] = newList;
    autoFillAllScores();
    closeModal();
  };
  modal.appendChild(btnSave);

  openModal();
}

/* ---------------------------------------------------------
   SCORING ENGINE
--------------------------------------------------------- */
function findPlayerByPlace(placements, place) {
  for (let i = 0; i < placements.length; i++) {
    if (placements[i] === place) return i;
  }
  return null;
}

function autoFillAllScores() {
  const placementsNow = rowState.map(r => r.placeSelect.value);
  const stinky13Count = placementsNow.filter(p => p === "Stinky 13").length;

  const baseScoresRow = [0, 0, 0, 0];

  for (let i = 0; i < rowCount; i++) {
    const placement = placementsNow[i];
    if (!placement) {
      baseScoresRow[i] = 0;
      continue;
    }

    let score;
    if (placement === "Stinky 13") score = -5;
    else if (placement === "1st")
      score = stinky13Count > 0 ? 5 * stinky13Count : 4;
    else if (placement === "2nd")
      score = stinky13Count === 2 ? 0 : 2;
    else score = baseScores[placement];

    baseScoresRow[i] = score;
  }

  const finalScores = baseScoresRow.slice();

  for (let i = 0; i < rowCount; i++) {
    if (!stinky2Enabled[i]) continue;

    const total = stinky2Total(
      Stinky2_red[i],
      Stinky2_black[i],
      Stinky2_pairs3[i],
      Stinky2_kind4[i],
      Stinky2_pairs4[i]
    );

    finalScores[i] += total;

    const giverPlace = placementsNow[i];
    let receiverIdx = null;

    if (giverPlace === "4th")
      receiverIdx = findPlayerByPlace(placementsNow, "3rd");
    else if (giverPlace === "Stinky 13")
      receiverIdx = findPlayerByPlace(placementsNow, "1st");
    else if (giverPlace === "3rd")
      receiverIdx = findPlayerByPlace(placementsNow, "2nd");

    if (receiverIdx !== null && receiverIdx !== undefined)
      finalScores[receiverIdx] -= total;
  }

  for (let i = 0; i < rowCount; i++) {
    const victimName = rowState[i].playerSelect.value;
    if (!victimName) continue;

    for (const entry of chopData[i]) {
      const chopper = entry.chopper;
      const types = entry.types;
      const chopperIdx = findPlayerRow(chopper);
      if (chopperIdx === null) continue;

      let totalPoints = 0;
      for (const [t, amt] of Object.entries(types)) {
        if (amt <= 0) continue;
        totalPoints += chopPoints(t) * amt;
      }

      finalScores[i] -= totalPoints;
      finalScores[chopperIdx] += totalPoints;
    }
  }

  for (let i = 0; i < rowCount; i++) {
    const r = rowState[i];
    const player = r.playerSelect.value;
    const placement = r.placeSelect.value;

    if (!player && !placement && chopData[i].length === 0) {
      r.scoreInput.value = "";
      r.choppedBySpan.textContent = "";
      continue;
    }

    r.scoreInput.value = finalScores[i].toString();
    const choppedBy = chopData[i].map(e => e.chopper);
    r.choppedBySpan.textContent = choppedBy.length
      ? choppedBy.join(", ")
      : "";
  }

  refreshTable();
}

/* ---------------------------------------------------------
   ROUND COMMIT
--------------------------------------------------------- */
function addRoundScores() {
  const selectedPlayers = [];
  const placements = [];
  const scores = [];

  for (let i = 0; i < rowCount; i++) {
    const r = rowState[i];
    const player = r.playerSelect.value;
    const placement = r.placeSelect.value;
    const scoreText = r.scoreInput.value;

    if (!player || !placement) {
      alert("All 4 players and placements must be selected.");
      return;
    }
    if (selectedPlayers.includes(player)) {
      alert("Each player can only appear once per round.");
      return;
    }
    if (scoreText === "") {
      alert("Scores must be calculated before adding the round.");
      return;
    }

    const scoreVal = parseInt(scoreText, 10);
    if (isNaN(scoreVal)) {
      alert("Invalid score format.");
      return;
    }

    selectedPlayers.push(player);
    placements.push(placement);
    scores.push(scoreVal);
  }

  const winners = selectedPlayers.filter(
    (p, i) => placements[i] === "1st"
  );

  for (let i = 0; i < rowCount; i++) {
    const player = selectedPlayers[i];
    const scoreVal = scores[i];

    players[player].score += scoreVal;
    players[player].games += 1;

    if (winners.includes(player)) players[player].wins += 1;
  }

  for (let i = 0; i < rowCount; i++) clearRow(i);

  refreshTable();

  if (canSave) {
    saveState();
  } else {
    setSyncStatus("View-only mode — not synced", "gray");
  }
}

/* ---------------------------------------------------------
   LEADERBOARD
--------------------------------------------------------- */
function refreshTable() {
  const tbody = document.getElementById("leaderboardBody");
  tbody.innerHTML = "";

  const data = [];
  for (const [name, stats] of Object.entries(players)) {
    const games = stats.games;
    const wins = stats.wins;
    const score = stats.score;
    const winRate = games > 0 ? (wins / games) * 100 : 0;
    data.push({ name, score, games, winRate });
  }

  data.sort((a, b) => b.score - a.score);

  const ranked = data.filter(d => d.games > 0);
  const unranked = data.filter(d => d.games === 0);
  const lastRankedName =
    ranked.length > 0 ? ranked[ranked.length - 1].name : null;

  let rank = 1;
  for (const d of ranked) {
    let cls = "normal";
    let crown = "";

    if (rank === 1) {
      cls = "rank1";
      crown = "👑 ";
    } else if (rank === 2) cls = "rank2";
    else if (rank === 3) cls = "rank3";
    else if (d.name === lastRankedName) cls = "last";

    const tr = document.createElement("tr");
    tr.className = cls;
    tr.innerHTML = `
      <td>${rank}</td>
      <td>${crown}${d.name}</td>
      <td>${d.score}</td>
      <td>${d.games}</td>
      <td>${d.winRate.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
    rank++;
  }

  for (const d of unranked) {
    const tr = document.createElement("tr");
    tr.className = "unranked";
    tr.innerHTML = `
      <td></td>
      <td>${d.name}</td>
      <td>${d.score}</td>
      <td>${d.games}</td>
      <td>${d.winRate.toFixed(1)}</td>
    `;
    tbody.appendChild(tr);
  }
}

/* ---------------------------------------------------------
   EXCEL IMPORT / EXPORT
--------------------------------------------------------- */
function exportToExcel() {
  if (Object.keys(players).length === 0) {
    alert("No player data to export.");
    return;
  }

  const data = [];
  for (const [name, stats] of Object.entries(players)) {
    const games = stats.games;
    const wins = stats.wins;
    const score = stats.score;
    const winRate = games > 0 ? (wins / games) * 100 : 0;

    data.push({
      "Player": name,
      "Total Score": score,
      "Games Played": games,
      "Wins": wins,
      "Win Rate (%)": Math.round(winRate * 100) / 100
    });
  }

  const worksheet = XLSX.utils.json_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Players");

  XLSX.writeFile(workbook, "chop_pig_players.xlsx");
}

function importFromExcel(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet);

    players = {};
    playerList = [];

    for (const row of rows) {
      const name = String(row["Player"]);
      const score = parseInt(row["Total Score"] || 0, 10);
      const games = parseInt(row["Games Played"] || 0, 10);
      const wins = parseInt(row["Wins"] || 0, 10);

      players[name] = { score, games, wins };
      playerList.push(name);
    }

    playerList.sort();
    updatePlayerDropdowns();
    refreshTable();
    saveState();
    alert("Player data imported successfully.");
  };

  reader.readAsArrayBuffer(file);
  event.target.value = "";
}
